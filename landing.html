<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Startup Landing</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; }
    header, footer { background: #222; color: white; padding: 20px; text-align: center; }
    .features { display: flex; gap: 20px; padding: 40px; flex-wrap: wrap; }
    .card { flex: 1 1 250px; padding: 20px; border: 1px solid #ddd; }
    .testimonials { background: #f4f4f4; padding: 40px; text-align: center; }
    @media (max-width: 600px) { .features { flex-direction: column; } }
  </style>
</head>
<body>
  <header>
    <h1>NextGen App</h1>
    <p>The future of productivity</p>
  </header>
  
  <section class="features">
    <div class="card"><h3>Fast</h3><p>Lightning speed performance.</p></div>
    <div class="card"><h3>Secure</h3><p>Enterprise-grade security.</p></div>
    <div class="card"><h3>Simple</h3><p>Easy for anyone to use.</p></div>
  </section>
  
  <section class="testimonials">
    <h2>What users say</h2>
    <p>"This app changed my workflow!" - Akshaya</p>
  </section>
  
  <footer><p>© 2026 NextGen App</p></footer>
</body>
</html>
