<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; margin-top: 150px; }
    .logo { font-size: 90px; font-weight: 400; margin-bottom: 20px; }
    .logo span:nth-child(1) { color: #4285f4; }
    .logo span:nth-child(2) { color: #ea4335; }
    .logo span:nth-child(3) { color: #fbbc05; }
    .logo span:nth-child(4) { color: #4285f4; }
    .logo span:nth-child(5) { color: #34a853; }
    .logo span:nth-child(6) { color: #ea4335; }
    .search { width: 500px; padding: 12px; border: 1px solid #ddd; border-radius: 24px; }
    .btn { margin: 20px 5px; padding: 10px 16px; background: #f8f9fa; border: 1px solid #f8f9fa; }
  </style>
</head>
<body>
  <div class="logo">
    <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
  </div>
  <input type="text" class="search">
  <div>
    <button class="btn">Google Search</button>
    <button class="btn">I'm Feeling Lucky</button>
  </div>
</body>
</html>
