<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Form</title>
  <style>
    body { font-family: Arial; padding: 20px; max-width: 500px; margin: auto; }
    input, textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; }
    button { padding: 10px 20px; background: #28a745; color: white; border: none; }
    .error { color: red; font-size: 14px; }
  </style>
</head>
<body>
  <h2>Job Application Form</h2>
  <form id="myForm" onsubmit="return validateForm()">
    <input type="text" id="name" placeholder="Name">
    <div id="nameError" class="error"></div>
    
    <input type="text" id="email" placeholder="Email">
    <div id="emailError" class="error"></div>
    
    <input type="text" id="phone" placeholder="Phone">
    <div id="phoneError" class="error"></div>
    
    <textarea id="message" placeholder="Message"></textarea>
    <div id="msgError" class="error"></div>
    
    <button type="submit">Submit</button>
  </form>

  <script>
    function validateForm() {
      let valid = true;
      document.querySelectorAll('.error').forEach(e => e.innerText = '');
      
      let name = document.getElementById('name').value;
      let email = document.getElementById('email').value;
      let phone = document.getElementById('phone').value;
      let msg = document.getElementById('message').value;
      
      if (name === '') {
        document.getElementById('nameError').innerText = 'Name required';
        valid = false;
      }
      if (!/^\S+@\S+\.\S+$/.test(email)) {
        document.getElementById('emailError').innerText = 'Valid email required';
        valid = false;
      }
      if (phone === '') {
        document.getElementById('phoneError').innerText = 'Phone required';
        valid = false;
      }
      if (msg === '') {
        document.getElementById('msgError').innerText = 'Message required';
        valid = false;
      }
      if (valid) alert('Form submitted!');
      return false; // prevent actual submit for demo
    }
  </script>
</body>
</html>
