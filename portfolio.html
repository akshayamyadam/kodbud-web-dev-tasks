<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>
<style>
body { font-family: Arial, sans-serif; margin: 0; padding: 20px; line-height: 1.6; }
.container { max-width: 800px; margin: auto; }
img { width: 150px; border-radius: 50%; }
h1, h2 { color: #333; }
.section { margin: 30px 0; }
input, textarea { width: 100%; padding: 8px; margin: 5px 0; } button { padding: 10px 20px; background: #0077b5; color: white; border: none; }
</style>
</head>
<body>
<div class="container">
<h1>Your Name</h1>
<img src="https://via.placeholder.com/150" alt="Profile">
<p><strong>Web Dev Intern</strong> | Short bio about your passion for coding.</p>
<div class="section">
<h2>Education</h2>
<p>B.Tech in CSE, Your College, 2026</p>
</div>
<div class="section">
<h2>Skills</h2>
<p>HTML, CSS, JavaScript, React</p>
</div>
<div class="section">
<h2>Projects</h2>
<p><strong>Project 1:</strong> Description of what you built.</p>
</div>
<div class="section">
<h2>Contact</h2>
<form>
<input type="text" placeholder="Your Name">
<input type="email" placeholder="Your Email">
<textarea placeholder="Message"></textarea>
<button type="submit">Send</button>
</form>
</div>
</div>
</body>
</html>
